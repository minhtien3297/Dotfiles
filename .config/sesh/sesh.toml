#:schema https://github.com/joshmedeski/sesh/raw/main/sesh.schema.json

[default_session]
preview_command = "eza -l --all --git --icons --color=always --no-user --no-permissions {}"

[[session]]
name = "Machine Status"
path = "~"
startup_command = "mole status"

[[session]]
name = "Learn"
path = "~/Thoughts/Areas/productivity"
startup_command = "yazi"
windows = [ "FreeCodeCamp", "NeetCode" ]

[[window]]
name = "FreeCodeCamp"
path = "~/Thoughts/Projects/FreeCodeCamp"
startup_script = "yazi"

[[window]]
name = "NeetCode"
path = "~/Thoughts/Projects/Neetcode"
startup_script = "yazi"
