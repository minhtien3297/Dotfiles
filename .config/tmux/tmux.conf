# Terminal behavior
set -g default-terminal 'tmux-256color'
set -sg terminal-overrides ',*:RGB'
set -g mouse on
set -gq allow-passthrough on
set -g visual-activity off
set -ga update-environment 'TERM'
set -ga update-environment 'TERM_PROGRAM'

# Shell and window defaults
set -g default-command 'reattach-to-user-namespace -l zsh'
set -g status-position top
set -g status on
set -g base-index 1
set -g pane-border-status off
set -g pane-base-index 1
set -g renumber-windows on
set -g detach-on-destroy off
setw -g mode-keys vi

# Plugins
set -g @plugin 'catppuccin/tmux#v2.3.0'
set -g @plugin 'tmux-plugins/tpm'
set -g @plugin 'tmux-plugins/tmux-sensible'
set -g @plugin 'christoomey/vim-tmux-navigator'
set -g @plugin 'tmux-plugins/tmux-resurrect'
set -g @plugin 'tmux-plugins/tmux-continuum'
set -g @plugin 'tmux-plugins/tmux-urlview'
set -g @plugin 'tmux-plugins/tmux-cpu'
set -g @plugin 'tmux-plugins/tmux-battery'

# Session persistence
set -g @continuum-restore 'on'
set -g @continuum-boot 'on'
set -g @continuum-boot-options 'kitty,fullscreen'
set -g @resurrect-strategy-nvim 'session'

# Catppuccin theme configuration
set -g @catppuccin_flavor "mocha"

set -g @catppuccin_window_status_style "rounded"
set -g window-status-separator " "
set -g @catppuccin_window_text " #{window_name}"
set -g @catppuccin_window_flags "icon"
set -g @catppuccin_window_number_position "left"
set -g @catppuccin_window_number " #I"
set -g @catppuccin_window_text " #W  "
set -g @catppuccin_window_current_number "#I"
set -g @catppuccin_window_current_text " #W"
set -g @catppuccin_directory_text " #(basename #{pane_current_path})"
set -g @catppuccin_date_time_text " %Y-%m-%d %H:%M"

# Utilities
run ~/.config/tmux/plugins/catppuccin/catppuccin.tmux
run ~/.config/tmux/plugins/tmux-cpu/cpu.tmux
run ~/.config/tmux/plugins/tmux-battery/battery.tmux

set -g status-right-length 100
set -g status-left-length 120
set -g status-left "#{E:@catppuccin_status_session}"
set -g status-right "#{E:@catppuccin_status_directory}"
set -agF status-right "#{E:@catppuccin_status_cpu}"
set -agF status-right "#{E:@catppuccin_status_ram}"
set -agF status-right "#{E:@catppuccin_status_battery}"
set -agF status-right "#{E:@catppuccin_status_date_time}"

# Prefix key
unbind C-b
set -g prefix C-Space
bind-key C-Space send-prefix

# Pane and window management
bind-key ';' split-window -v -c '#{pane_current_path}'
bind-key ':' split-window -h -c '#{pane_current_path}'
bind-key -r h resize-pane -L 5
bind-key -r j resize-pane -D 5
bind-key -r k resize-pane -U 5
bind-key -r l resize-pane -R 5
bind-key -r m resize-pane -Z
bind-key x kill-pane
bind-key '&' kill-window

# Dynamic window naming based on content
set -g automatic-rename on
set -g automatic-rename-format '#{?#{==:#{pane_current_command},zsh},#{b:pane_current_path},#{pane_current_command}}'
set -g status-interval 5

# Sesh integration with fzf
bind-key "w" run-shell "sesh connect \"$(
  sesh list --icons | fzf-tmux -p 100%,100% \
    --no-sort --ansi --border-label ' sesh ' --prompt '⚡  ' \
    --header '  ^a all ^t tmux ^g configs ^d tmux kill ^f find files' \
    --bind 'tab:down,btab:up' \
    --bind 'ctrl-a:change-prompt(⚡  )+reload(sesh list --icons)' \
    --bind 'ctrl-t:change-prompt(🪟  )+reload(sesh list -t --icons)' \
    --bind 'ctrl-g:change-prompt(⚙️  )+reload(sesh list -c --icons)' \
    --bind 'ctrl-f:change-prompt(🔎 )+reload(fd -H -d 4 -t d -E .Trash . ~)' \
    --bind 'ctrl-d:execute(tmux kill-session -t {2..})+change-prompt(⚡  )+reload(sesh list --icons)' \
    --preview-window 'right:60%' \
    --preview 'sesh preview {}'
)\""

bind-key "t" run-shell "sesh window \"$(sesh window | fzf-tmux -p 100%,100% \
  --no-sort --ansi --border-label ' sesh window ' --prompt '🪟  ' \
  --preview-window 'right:60%' \
  --preview 'tmux capture-pane -t {1} -p -e 2>/dev/null | head -30 || echo \"No content\"'
)\""

run ~/.config/tmux/plugins/tpm/tpm
