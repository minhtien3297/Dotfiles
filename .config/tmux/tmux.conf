# Terminal behavior
set -g default-terminal 'tmux-256color'
set -sg terminal-overrides ',*:RGB'
set -g mouse on
set -gq allow-passthrough on
set -g visual-activity off
set -ga update-environment 'TERM'
set -ga update-environment 'TERM_PROGRAM'

# Shell and window defaults
set -g default-command 'reattach-to-user-namespace -l zsh'
set -g status-position top
set -g base-index 1
set -g pane-base-index 1
set -g renumber-windows on
set -g detach-on-destroy off
setw -g mode-keys vi

# TPM plugins
set -g @plugin 'catppuccin/tmux'
set -g @plugin 'tmux-plugins/tmux-sensible'
set -g @plugin 'schasse/tmux-jump'
set -g @plugin 'christoomey/vim-tmux-navigator'
set -g @plugin 'tmux-plugins/tmux-urlview'
set -g @plugin 'tmux-plugins/tmux-resurrect'
set -g @plugin 'tmux-plugins/tmux-continuum'
set -g @plugin 'tmux-plugins/tmux-yank'
set -g @plugin 'tmux-plugins/tpm'

# Session persistence
set -g @continuum-restore 'on'
set -g @continuum-boot 'on'
set -g @continuum-boot-options 'kitty,fullscreen'
set -g @resurrect-strategy-nvim 'session'

# Catppuccin theme
set -g @catppuccin_flavour 'mocha'

# Catppuccin windows
set -g @catppuccin_window_left_separator 'ŅéČ'
set -g @catppuccin_window_middle_separator ' | '
set -g @catppuccin_window_right_separator 'Ņé┤ '
set -g @catppuccin_window_number_position 'right'
set -g @catppuccin_window_status_enable 'yes'
set -g @catppuccin_window_default_fill 'none'
set -g @catppuccin_window_current_fill 'all'
set -g @catppuccin_window_default_text '#W'
set -g @catppuccin_window_current_text '#W'

# Catppuccin window icons
set -g @catppuccin_icon_window_last ' ¾░¢░ '
set -g @catppuccin_icon_window_current ' ¾░¢» '
set -g @catppuccin_icon_window_zoom ' ¾░üī '
set -g @catppuccin_icon_window_mark ' ¾░āĆ '
set -g @catppuccin_icon_window_silent ' ¾░éø '
set -g @catppuccin_icon_window_activity ' ¾░¢▓ '
set -g @catppuccin_icon_window_bell ' ¾░é× '

# Catppuccin status line
set -g @catppuccin_status_left_separator 'ŅéČ'
set -g @catppuccin_status_right_separator ' ŅéČ'
set -g @catppuccin_status_right_separator_inverse 'yes'
set -g @catppuccin_status_fill 'all'
set -g @catppuccin_status_connect_separator 'no'
set -g @catppuccin_status_modules_right 'directory session date_time'
set -g @catppuccin_directory_text '#{pane_current_path}'
set -g @catppuccin_date_time_text '%d/%m/%Y %H:%M:%S'

# Prefix key
unbind C-b
set -g prefix C-Space
bind-key C-Space send-prefix

# Copy mode
bind-key -T copy-mode-vi v send-keys -X begin-selection
bind-key -T copy-mode-vi C-v send-keys -X rectangle-toggle
bind-key -T copy-mode-vi y send-keys -X copy-selection-and-cancel

# Pane and window management
bind-key ';' split-window -v -c '#{pane_current_path}'
bind-key ':' split-window -h -c '#{pane_current_path}'
bind-key -r h resize-pane -L 5
bind-key -r j resize-pane -D 5
bind-key -r k resize-pane -U 5
bind-key -r l resize-pane -R 5
bind-key -r m resize-pane -Z
bind-key x kill-pane
bind-key '&' kill-window

# Utilities
set -g @jump-key 'f'
bind-key b popup -d '#{pane_current_path}' -E -h 100% -w 100% -x 100% 'btop'

run '~/.tmux/plugins/tpm/tpm'
