"$schema" = 'https://starship.rs/config-schema.json'

command_timeout = 1500
scan_timeout = 30
palette = 'catppuccin_mocha'

format = """
[¯éÂ](red)\
$os\
$username\
[¯é░](bg:peach fg:red)\
$directory\
[¯é░](bg:yellow fg:peach)\
$git_branch\
$git_status\
[¯é░](fg:yellow bg:green)\
$c\
$rust\
$golang\
$nodejs\
$php\
$java\
$kotlin\
$haskell\
$python\
[¯é░](fg:green bg:sapphire)\
$conda\
[¯é░](fg:sapphire bg:lavender)\
$time\
[¯é┤ ](fg:lavender)\
$cmd_duration\
