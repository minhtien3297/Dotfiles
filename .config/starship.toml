[os]
disabled = false
style = "bg:red fg:crust"

[os.symbols]
Alpine = "´îÇ"
Amazon = "´ë░"
Android = "¯£Ä"
Arch = "¾░úç"
CentOS = "´îä"
Debian = "¾░úÜ"
Fedora = "¾░úø"
Gentoo = "¾░ú¿"
Linux = "¾░î¢"
Macos = "¾░ÇÁ"
Manjaro = "´îÆ"
Mint = "¾░ú¡"
Raspbian = "¾░É┐"
RedHatEnterprise = "¾▒äø"
Redhat = "¾▒äø"
SUSE = "´îö"
Ubuntu = "¾░òê"
Windows = "¯£Å"

[username]
show_always = true
style_root = "bg:red fg:crust"
style_user = "bg:red fg:crust"
format = '[ $user]($style)'

[directory]
style = "bg:peach fg:crust"
format = "[ $path ]($style)"
truncation_length = 0
truncate_to_repo = false

[directory.substitutions]
"Developer" = "¾░▓ï "
"Documents" = "¾░êÖ "
"Downloads" = "´ÇÖ "
"Music" = "¾░ØÜ "
"Pictures" = "´Ç¥ "

[git_branch]
symbol = "´Éÿ"
style = "bg:yellow"
format = '[[ $symbol $branch ](fg:crust bg:yellow)]($style)'

[git_status]
style = "bg:yellow"
format = '[[($all_status$ahead_behind )](fg:crust bg:yellow)]($style)'

[c]
symbol = "¯ÿ× "
style = "bg:green"
format = '[[ $symbol( $version) ](fg:crust bg:green)]($style)'

[golang]
symbol = "¯ÿº"
style = "bg:green"
format = '[[ $symbol( $version) ](fg:crust bg:green)]($style)'

[haskell]
symbol = "¯ÿƒ"
style = "bg:green"
format = '[[ $symbol( $version) ](fg:crust bg:green)]($style)'

[java]
symbol = "¯ëû "
style = "bg:green"
format = '[[ $symbol( $version) ](fg:crust bg:green)]($style)'

[kotlin]
symbol = "¯ÿ┤"
style = "bg:green"
format = '[[ $symbol( $version) ](fg:crust bg:green)]($style)'

[nodejs]
symbol = "¯£ÿ"
style = "bg:green"
format = '[[ $symbol( $version) ](fg:crust bg:green)]($style)'

[php]
symbol = "¯ÿê"
style = "bg:green"
format = '[[ $symbol( $version) ](fg:crust bg:green)]($style)'

[python]
symbol = "¯ÿå"
style = "bg:green"
format = '[[ $symbol( $version)(\(#$virtualenv\)) ](fg:crust bg:green)]($style)'

[rust]
symbol = "¯×¿"
style = "bg:green"
format = '[[ $symbol( $version) ](fg:crust bg:green)]($style)'

[conda]
symbol = " ´äî "
style = "fg:crust bg:sapphire"
format = '[$symbol$environment ]($style)'
ignore_base = false

[time]
disabled = false
time_format = "%T"
style = "bg:lavender"
format = '[[ ´É║ $time ](fg:crust bg:lavender)]($style)'

[line_break]
disabled = false

[character]
disabled = false
error_symbol = '[Ô£ù](bold fg:red)'
success_symbol = '[Ô×£](bold fg:green)'
vimcmd_symbol = '[V](bold fg:green)'
vimcmd_replace_one_symbol = '[V](bold fg:lavender)'
vimcmd_replace_symbol = '[V](bold fg:lavender)'
vimcmd_visual_symbol = '[V](bold fg:yellow)'

[cmd_duration]
disabled = false
show_milliseconds = true
style = "bg:lavender"
format = "¯½┤ in $duration "

