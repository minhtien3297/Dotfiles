gui:
  nerdFontsVersion: "3"
  sidePanelWidth: 0.2
  filterMode: fuzzy
  showDivergenceFromBaseBranch: arrowAndNumber
  theme:
    activeBorderColor:
      - "#f5e0dc"
      - bold
    inactiveBorderColor:
      - "#a6adc8"
    optionsTextColor:
      - "#89b4fa"
    selectedLineBgColor:
      - "#313244"
    selectedRangeBgColor:
      - "#313244"
    cherryPickedCommitBgColor:
      - "#45475a"
    cherryPickedCommitFgColor:
      - "#f5e0dc"
    unstagedChangesColor:
      - "#f38ba8"
    defaultFgColor:
      - "#cdd6f4"
    searchingActiveBorderColor:
      - "#f9e2af"
      - bold
    markedBaseCommitFgColor:
      - "#89b4fa"
    markedBaseCommitBgColor:
      - "#f9e2af"

git:
  parseEmoji: true
  pagers:
    - externalDiffCommand: difft --color=always --syntax-highlight=on

os:
  editPreset: nvim

customCommands:
  - key: "<c-v>"
    context: global
    description: Create commit
    loadingText: Creating conventional commit...
    prompts:
      - type: menu
        key: Type
        title: Type of change
        options:
          - name: feat
            description: A new feature
            value: feat
          - name: fix
            description: A bug fix
            value: fix
          - name: refactor
            description: A code change that neither fixes a bug nor adds a feature
            value: refactor
          - name: docs
            description: Documentation only changes
            value: docs
          - name: test
            description: Adding missing tests or correcting existing tests
            value: test
          - name: chore
            description: Other changes that don't modify src or test files
            value: chore
          - name: build
            description: Changes that affect the build system or external dependencies
            value: build
          - name: ci
            description: Changes to CI configuration files and scripts
            value: ci
          - name: perf
            description: A code change that improves performance
            value: perf
          - name: style
            description: Changes that do not affect the meaning of the code
            value: style
          - name: revert
            description: Reverts a previous commit
            value: revert
      - type: input
        key: Message
        title: message
      - type: confirm
        key: Confirm
        title: Commit
        body: Are you sure you want to commit?
    command: "git commit --message '[{{.Form.Type}}]: {{.Form.Message}}'"
    output: log

  - key: p
    context: global
    description: Pull from a selected remote
    loadingText: Pulling...
    prompts:
      - type: menuFromCommand
        title: Select remote
        command: git remote
        filter: (?P<remote>.+)
        valueFormat: "{{ .remote }}"
        labelFormat: "{{ .remote | bold | cyan }}"
    command: git pull {{ index .PromptResponses 0 }} {{ .CheckedOutBranch.Name }}

  - key: P
    context: global
    description: Push to a selected remote
    loadingText: Pushing...
    prompts:
      - type: menuFromCommand
        title: Select remote
        command: git remote
        filter: (?P<remote>.+)
        valueFormat: "{{ .remote }}"
        labelFormat: "{{ .remote | bold | cyan }}"
      - type: menu
        title: Push mode
        options:
          - name: push
            description: Push the current branch normally
            value: push
          - name: force-with-lease
            description: Force push with lease protection
            value: push --force-with-lease
    command: git {{ index .PromptResponses 1 }} {{ index .PromptResponses 0 }}
